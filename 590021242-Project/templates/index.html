<!DOCTYPE html>
<html>
<head>
    <title>Math Toolkit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>✨ Math Toolkit</h1>

    <form action="/calculate" method="post">

        <select name="operation" onchange="toggleInputs(this.value)">
            <option value="factorial">Factorial</option>
            <option value="fibonacci">Fibonacci</option>
            <option value="prime">Prime Check</option>
            <option value="palindrome">Palindrome</option>
            <option value="si">Simple Interest</option>
        </select>

        <!-- Number Input -->
        <div id="numberInput">
            <input type="number" name="num" placeholder="Enter number">
        </div>

        <!-- Simple Interest Inputs -->
        <div id="siInputs" style="display: none;">
            <input type="text" name="p" placeholder="Principal">
            <input type="text" name="r" placeholder="Rate">
            <input type="text" name="t" placeholder="Time">
        </div>

        <button type="submit">Calculate</button>
    </form>

    {% if result %}
        <div class="result">
            Result: {{ result }}
        </div>
    {% endif %}
</div>

<!-- JavaScript -->
<script>
function toggleInputs(operation) {
    const numberInput = document.getElementById("numberInput");
    const siInputs = document.getElementById("siInputs");

    if (operation === "si") {
        numberInput.style.display = "none";
        siInputs.style.display = "block";
    } else {
        numberInput.style.display = "block";
        siInputs.style.display = "none";
    }
}
</script>

</body>
</html>
